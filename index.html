<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DenGame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <img src="logo.png" class="logo">
  <input id="search" type="text" placeholder="Search games..." oninput="filterGames()">
</header>

<section class="filters">
  <button onclick="showAll()">All</button>
  <button onclick="filterCategory('horror')">Horror</button>
  <button onclick="filterCategory('multiplayer')">Multiplayer</button>
  <button onclick="filterCategory('vr')">VR</button>
</section>

<section>
  <h2>🔥 Featured Games</h2>

  <div class="grid">

    <a class="card horror" href="games/game1/index.html" onclick="addView('game1')">
      <img src="images/game1.png">
      <p>Backrooms Horror</p>
      <span class="views" id="game1-views">0 views</span>
    </a>

    <a class="card multiplayer" href="games/game2/index.html" onclick="addView('game2')">
      <img src="images/game2.png">
      <p>Online Battle</p>
      <span class="views" id="game2-views">0 views</span>
    </a>

    <a class="card vr" href="games/game3/index.html" onclick="addView('game3')">
      <img src="images/game3.png">
      <p>VR Test</p>
      <span class="views" id="game3-views">0 views</span>
    </a>

  </div>
</section>

<script src="script.js"></script>
</body>
</html>
