<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DenGame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <!-- Fixed case sensitivity and wrapped in a class -->
  <div class="logo-container">
    <img src="logo.png" class="logo" alt="DenGame Logo">
  </div>
  <input id="search" type="text" placeholder="Search games..." oninput="filterGames()">
</header>

<section class="filter-section">
  <div class="filters">
    <button class="active" onclick="filterCategory('all', this)">All</button>
    <button onclick="filterCategory('horror', this)">Horror</button>
    <button onclick="filterCategory('multiplayer', this)">Multiplayer</button>
    <button onclick="filterCategory('vr', this)">VR</button>
  </div>
</section>

<main>
  <h2>🔥 Featured Games</h2>
  <!-- JS will now inject your custom games folder list inside here -->
  <div class="grid" id="games-grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
