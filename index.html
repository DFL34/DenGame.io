<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DENGAMES.IO | Play Free Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
  <!-- SIDEBAR NAVIGATION -->
  <aside class="sidebar">
    <div class="brand">
      <h1 id="text-logo">DEN<span>GAMES.IO</span></h1>
    </div>
    
    <nav class="nav-menu">
      <button class="nav-item active" onclick="filterCategory('all', this)">All Games</button>
      <button class="nav-item" onclick="filterCategory('horror', this)">Horror</button>
      <button class="nav-item" onclick="filterCategory('multiplayer', this)">Multiplayer</button>
    </nav>
    <div class="sidebar-footer">© 2026 DENGAMES.IO</div>
  </aside>

  <!-- MAIN CONTENT AREA -->
  <div class="main-wrapper">
    <header class="top-bar">
      <div class="search-box">
        <input id="search" type="text" placeholder="Search games..." oninput="filterGames()">
      </div>
    </header>

    <main class="content">
      <div class="section-header">
        <h2 class="section-title">Games Matrix</h2>
        <div class="game-count" id="count-tag">0 Games Loaded</div>
      </div>
      
      <!-- Real games grid matrix -->
      <div class="crazy-grid" id="games-grid"></div>
    </main>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
